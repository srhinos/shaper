<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 400px; background: #1e1e2e; color: #cdd6f4; font-family: monospace; font-size: 12px; padding: 12px; }
  .toolbar { display: flex; gap: 5px; margin-bottom: 8px; }
  button { background: #313244; color: #cdd6f4; border: 1px solid #45475a; border-radius: 4px; padding: 5px 10px; cursor: pointer; font-family: monospace; font-size: 11px; }
  button:hover { background: #45475a; }
  button.active { background: #a6e3a1; color: #1e1e2e; }
  .status-bar { margin-bottom: 8px; padding: 6px 8px; background: #313244; border-radius: 4px; min-height: 28px; }
  .recording { color: #a6e3a1; }
  .paused { color: #6c7086; }
  .tab-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .tab-chip { display: inline-flex; align-items: center; gap: 4px; background: #45475a; border-radius: 3px; padding: 2px 6px; font-size: 10px; }
  .tab-chip .remove { cursor: pointer; color: #f38ba8; font-weight: bold; }
  .domain-bar { margin-bottom: 8px; display: flex; gap: 4px; }
  .domain-bar input { flex: 1; background: #313244; color: #cdd6f4; border: 1px solid #45475a; border-radius: 4px; padding: 5px 8px; font-family: monospace; font-size: 11px; outline: none; }
  .domain-bar input:focus { border-color: #89b4fa; }
  .domain-bar input::placeholder { color: #585b70; }
  .domain-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .domain-chip { display: inline-flex; align-items: center; gap: 4px; background: #89b4fa22; border: 1px solid #89b4fa44; border-radius: 3px; padding: 2px 6px; font-size: 10px; color: #89b4fa; }
  .domain-chip .remove { cursor: pointer; color: #f38ba8; }
  .summary { color: #a6adc8; font-size: 11px; margin-bottom: 10px; text-align: center; }
  .dashboard-btn { display: block; width: 100%; background: #89b4fa; color: #1e1e2e; border: none; border-radius: 6px; padding: 10px; font-family: monospace; font-size: 13px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
  .dashboard-btn:hover { background: #74c7ec; }
  .bottom-bar { display: flex; justify-content: space-between; align-items: center; }
  .shortcut { color: #585b70; font-size: 10px; }
  .clear-btn { background: none; border: 1px solid #f38ba844; color: #f38ba8; font-size: 10px; padding: 2px 8px; }
  .clear-btn:hover { background: #f38ba822; }
</style>
</head>
<body>
  <div class="toolbar">
    <button id="thisTab">+ This Tab</button>
    <button id="allTabs">All Tabs</button>
    <button id="pause">Pause</button>
  </div>
  <div class="status-bar" id="status"></div>
  <div class="domain-bar">
    <input type="text" id="domainInput" placeholder="Filter domain (e.g. api.example.com)">
    <button id="addDomain">+</button>
  </div>
  <div class="domain-chips" id="domainChips"></div>
  <div class="summary" id="summary"></div>
  <button class="dashboard-btn" id="openDashboard">Open Dashboard</button>
  <div class="bottom-bar">
    <span class="shortcut">Alt+Shift+C to toggle capture</span>
    <button class="clear-btn" id="clear">Clear All</button>
  </div>
<script src="popup.js"></script>
</body>
</html>
